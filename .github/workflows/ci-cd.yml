name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: skynet-ops

jobs:
  test:
    name: Lint & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install httpx pytest

      - name: Start service (background)
        run: |
          APP_ENV=test LOG_LEVEL=WARNING uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3

      - name: Smoke test /health
        run: curl -f http://localhost:8000/health

      - name: Smoke test POST /events
        run: |
          curl -f -X POST http://localhost:8000/events \
            -H "Content-Type: application/json" \
            -d '{"type":"ci_test_event","tenantId":"ci_tenant","severity":"info","message":"CI smoke test event","source":"github-actions"}'

      - name: Smoke test GET /events
        run: curl -f "http://localhost:8000/events?tenantId=ci_tenant"

      - name: Smoke test validation rejection
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:8000/events \
            -H "Content-Type: application/json" \
            -d '{"type":"bad","tenantId":"","severity":"invalid","message":"","source":"test"}')
          if [ "$STATUS" != "400" ]; then
            echo "Expected 400 but got $STATUS"
            exit 1
          fi
          echo "Validation correctly returned 400"

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/skynet-ops:latest
            docker stop skynet-ops || true
            docker rm skynet-ops || true
            docker run -d \
              --name skynet-ops \
              --restart unless-stopped \
              -p 80:8000 \
              -e APP_ENV=dev \
              -e LOG_LEVEL=INFO \
              -e SERVICE_NAME=skynet-ops \
              ${{ secrets.DOCKERHUB_USERNAME }}/skynet-ops:latest
            for i in {1..5}; do
              sleep 3
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health)
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed"
                exit 0
              fi
              echo "Attempt $i: got $STATUS, retrying..."
            done
            echo "Health check failed after deploy!"
            exit 1
